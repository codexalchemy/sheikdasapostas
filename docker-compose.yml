services:
  sheik:
    build: .
    container_name: sheik-das-apostas
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    volumes:
      - sheik_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sheik_data:
